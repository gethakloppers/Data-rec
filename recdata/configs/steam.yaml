dataset_name: steam
domain: media_and_entertainment
business_model: transactional_gaming_platform
version: "2018"
source_url: "https://github.com/kang205/SASRec"
description: >
  Steam game reviews and metadata from the SASRec paper. Contains 7.8M reviews
  covering 2.5M users and 32K games. Includes developer/publisher metadata
  and pricing information, making it suitable for multi-stakeholder evaluation
  with consumer, provider, and system perspectives.



stakeholder_roles:
  consumer: true       # User interaction logs (reviews, hours played)
  system: true         # Price data enables monetary reward evaluation
  provider: true       # Developer and publisher metadata present
  upstream: false
  downstream: false
  third_party: false

# Format and encoding are auto-detected from the filename.
# These files use Python-repr dict JSONL (one dict per line, not valid JSON).
files:
  interactions: "steam_reviews.json"
  items: "steam_games.json"
  users: null           # No separate user file

# Column role mapping: first match wins (case-insensitive)
schema:
  user_identifier: ["username", "user_id", "userid"]
  item_identifier: ["product_id", "app_id", "appid", "game_id", "id"]
  timestamp: ["date", "timestamp", "time", "review_date"]
  rating: ["hours", "rating", "score"]

# Feature type declarations (for profiling metadata, NOT column renaming)
# Types: token (categorical), float (numeric), token_seq (list of categories),
#        text (free text), drop (exclude from output)
item_features:
  token: ["type", "publisher", "developer", "early_access", "sentiment"]
  float: ["price", "discount_price"]
  token_seq: ["genres", "tags", "specs", "platforms"]
  text: ["title", "app_name", "description"]
  drop: ["url", "reviews_url", "icon", "website"]

interaction_features:
  token: ["early_access"]
  float: ["hours"]
  token_seq: []
  text: ["text"]
  drop: ["page", "page_order", "compensation", "found_funny"]

user_features: null
