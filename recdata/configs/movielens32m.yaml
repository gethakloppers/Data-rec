dataset_name: movielens32m
domain: media_and_entertainment
business_model: content_platform
version: "32m"
source_url: "https://grouplens.org/datasets/movielens/latest/"
description: >
  MovieLens 32M dataset from GroupLens Research. Contains 32 million ratings
  across 87K movies by approximately 480K users. Ratings are explicit (0.5-5.0
  stars) with timestamps. Includes movie genres but no provider metadata
  (no studio, director, or distributor information).
citation: |
  F. Maxwell Harper and Joseph A. Konstan. The MovieLens Datasets: History
  and Context. ACM Trans. Interact. Intell. Syst. 5(4), 2016.

stakeholder_roles:
  consumer: true
  system: false
  # NOTE: No provider fields available in MovieLens — no studio, director, or
  # distributor metadata. Provider-side evaluation is not possible.
  provider: false
  upstream: false
  downstream: false
  third_party: false

# Format and separator are auto-detected (CSV with comma separator).
files:
  interactions: "ratings.csv"
  items: "movies.csv"
  users: null           # No separate user file
  # tags: "tags.csv"   # Supplementary file; load separately if needed

# Column role mapping: first match wins (case-insensitive)
schema:
  user_identifier: ["userId", "user_id", "userid"]
  item_identifier: ["movieId", "movie_id", "movieid"]
  timestamp: ["timestamp"]
  rating: ["rating"]

# Feature type declarations (for profiling metadata — NOT column renaming)
item_features:
  text: ["title"]
  token_seq: ["genres"]   # Pipe-separated: "Action|Comedy|Drama"
  token: []
  float: []
  drop: []

interaction_features:
  float: ["rating"]
  token: []
  token_seq: []
  text: []
  drop: []

user_features: null
