dataset_name: xwines
domain: food_and_beverage
business_model: review_platform
version: "full"
source_url: "https://github.com/rogerioxavier/X-Wines"
description: >
  X-Wines dataset for wine recommender systems and machine learning.
  Contains 21M ratings from over 1M users across 100K wines spanning
  62 countries and 2,160 producing regions. Includes winery and region
  metadata, enabling provider-side evaluation. Published in Big Data
  and Cognitive Computing (2023).

# Format is auto-detected as zip. The zip archives each contain a single CSV.
files:
  interactions: "XWines_Full_21M_ratings.zip"
  items: "XWines_Full_100K_wines.zip"
  users: null           # No separate user file (UserIDs in ratings only)



stakeholder_roles:
  consumer: true       # User identifiers and explicit ratings present
  system: false        # No price or economic data in the public release
  provider: true       # WineryID, WineryName, RegionID present
  upstream: false
  downstream: false
  third_party: false



# Column role mapping
schema:
  user_identifier: ["UserID", "user_id", "userid"]
  item_identifier: ["WineID", "wine_id", "wineid"]
  timestamp: ["Date", "date", "timestamp"]
  rating: ["Rating", "rating"]

# Feature type declarations
item_features:
  token: ["Type", "Elaborate", "RegionID", "WineryID"]
  float: []
  token_seq: ["Grapes"]     # May contain multiple grape varieties
  text: ["WineName", "WineryName", "RegionName", "Country"]
  drop: ["Website"]

interaction_features:
  float: ["Rating"]
  token: ["Vintage"]        # Vintage year or "N.V."
  token_seq: []
  text: []
  drop: ["RatingID"]

user_features: null
