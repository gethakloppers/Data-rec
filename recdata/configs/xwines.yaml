dataset_name: xwines
domain: ecommerce_and_retail
source_url: https://github.com/rogerioxavier/X-Wines
citation: |
  @Article{xwines,
  AUTHOR = {de Azambuja, Rogério Xavier and Morais, A. Jorge and Filipe, Vítor},
  TITLE = {X-Wines: A Wine Dataset for Recommender Systems and Machine Learning},
  JOURNAL = {Big Data and Cognitive Computing},
  VOLUME = {7},
  YEAR = {2023},
  NUMBER = {1},
  ARTICLE-NUMBER = {20},
  URL = {https://www.mdpi.com/2504-2289/7/1/20},
  DOI = {10.3390/bdcc7010020}
  }

stakeholder_roles:
  consumer:
    supported: true
    id: [userid]
    features: []
  provider:
    supported: true
    id: [wineryid]
    features: [wineryname]
  upstream:
    supported: false
  downstream:
    supported: false
  system:
    supported: true
    features: [country, code]
  third_party:
    supported: false

files:
  interactions: XWines_Full_21M_ratings.csv
  items: XWines_Full_100K_wines.csv
  users: null

schema:
  user_identifier: [userid]
  item_identifier: [wineid]
  timestamp: [date]
  rating: [rating]

item_features:
  object: [wineid, type, elaborate, grapes, harmonize, body, acidity, code, regionid, wineryid, vintages]
  float: [abv]
  string: [winename, country, regionname, wineryname, website]
  datetime: []
  bool: []
  misc: []
  exclude: []

interaction_features:
  object: [userid, wineid]
  float: [rating]
  string: []
  datetime: [date]
  bool: []
  misc: []
  exclude: [ratingid, vintage]

user_features: null

other_features: null

taxonomy:
  interactions:
    user_id: [userid]
    item_id: [wineid]
    explicit_feedback: [rating]
    implicit_feedback: []
    timestamp: [date]
    session_data: []
    interaction_context: []
    other: []
    exclude: [ratingid, vintage]
  items:
    item_id: [wineid]
    descriptive_features: [type, elaborate, grapes, harmonize, abv, body, acidity, code, regionid, wineryname, vintages]
    content_features: [winename, country, regionname]
    provider_upstream_info: [wineryid]
    other: [website, ratingid, userid, vintage, rating, date]
    exclude: []
  users: null
  other: null
